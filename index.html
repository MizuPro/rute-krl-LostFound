<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost and Found - KRL CommuterLink</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-xl-10">
            <h2 class="text-center mb-4">Lapor Barang Hilang / Tertinggal</h2>

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <form id="lost-and-found-form">
                        <!-- Form fields -->
                        <div class="mb-3">
                            <label for="nama_pelapor" class="form-label">Nama Pelapor</label>
                            <input type="text" class="form-control" id="nama_pelapor" placeholder="Masukkan nama Anda">
                        </div>

                        <div class="mb-3">
                            <label for="lokasi_stasiun" class="form-label">Lokasi Stasiun Kejadian</label>
                            <input type="text" class="form-control" id="lokasi_stasiun" placeholder="Pilih stasiun pada peta di bawah" readonly required>
                            <small class="form-text text-muted">Silakan klik salah satu stasiun pada peta di bawah ini.</small>
                        </div>

                        <!-- Map Container -->
                        <div class="mb-3">
                            <label class="form-label">Peta KRL CommuterLink</label>
                            <div class="card overflow-auto">
                                <div class="map-container" style="min-width: 800px;">
                                    <svg viewBox="0 0 1000 1000" class="w-100 h-100" id="krl-map">
                                        <!-- Map Image Overlay -->
                                        <image href="image.png" width="100%" height="100%"></image>

                                        <!-- Interactive Station Nodes -->
                                        <g class="station-node" data-station="Jakarta Kota" transform="translate(508, 126)">
                                            <circle cx="0" cy="0" r="10" class="station-circle"></circle>
                                            <text x="15" y="5" class="station-text">Jakarta Kota</text>
                                        </g>
                                        <g class="station-node" data-station="Manggarai" transform="translate(586, 355)">
                                            <circle cx="0" cy="0" r="10" class="station-circle"></circle>
                                            <text x="15" y="5" class="station-text">Manggarai</text>
                                        </g>
                                        <g class="station-node" data-station="Tanah Abang" transform="translate(438, 307)">
                                            <circle cx="0" cy="0" r="10" class="station-circle"></circle>
                                            <text x="15" y="5" class="station-text">Tanah Abang</text>
                                        </g>
                                        <g class="station-node" data-station="Sudirman" transform="translate(513, 368)">
                                            <circle cx="0" cy="0" r="10" class="station-circle"></circle>
                                            <text x="15" y="5" class="station-text">Sudirman</text>
                                        </g>
                                        <g class="station-node" data-station="Bogor" transform="translate(625, 960)">
                                            <circle cx="0" cy="0" r="10" class="station-circle"></circle>
                                            <text x="15" y="5" class="station-text">Bogor</text>
                                        </g>
                                    </svg>
                                </div>
                            </div>
                        </div>

                        <div class="mt-4">
                            <button type="button" class="btn btn-danger w-100">Kirim Laporan</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.css"></script>
<script src="script.js"></script>
</body>
</html>
