<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost and Found KRL CommuterLink</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">Form Pelaporan Lost and Found</h4>
                </div>
                <div class="card-body">
                    <form>
                        <div class="mb-3">
                            <label for="lokasi_stasiun" class="form-label fw-bold">Lokasi Stasiun Kejadian</label>
                            <input type="text" class="form-control form-control-lg bg-white" id="lokasi_stasiun" name="lokasi_stasiun" placeholder="Pilih stasiun pada peta di bawah" readonly>
                            <div class="form-text">Klik stasiun pada peta KRL interaktif di bawah ini untuk memilih lokasi kejadian.</div>
                        </div>

                        <!-- Peta Interaktif -->
                        <div class="card border-0 bg-light mt-4">
                            <div class="card-body p-0">
                                <div class="table-responsive" style="max-height: 600px; overflow: auto;">
                                    <!-- viewBox disesuaikan dengan proporsi gambar KRL map (misal 2480x3508 -> rasio 1:1.414) -->
                                    <svg id="map-svg" viewBox="0 0 1000 1414" class="w-100" style="min-width: 800px; height: auto;">
                                        <!-- Gambar Map KRL Asli -->
                                        <image href="image.png" width="100%" height="100%"></image>

                                        <!-- Interactive Nodes Overlay -->
                                        <!-- 1. Jakarta Kota -->
                                        <g class="station-node" data-station="Jakarta Kota" transform="translate(534, 113)">
                                            <circle cx="0" cy="0" r="16" class="station-circle"></circle>
                                            <text x="20" y="5" class="station-text">Jakarta Kota</text>
                                        </g>

                                        <!-- 2. Tanah Abang -->
                                        <g class="station-node" data-station="Tanah Abang" transform="translate(454, 474)">
                                            <circle cx="0" cy="0" r="12" class="station-circle"></circle>
                                            <text x="-20" y="5" class="station-text text-end" text-anchor="end">Tanah Abang</text>
                                        </g>

                                        <!-- 3. Sudirman -->
                                        <g class="station-node" data-station="Sudirman" transform="translate(484, 474)">
                                            <circle cx="0" cy="0" r="12" class="station-circle"></circle>
                                            <text x="-20" y="5" class="station-text text-end" text-anchor="end">Sudirman</text>
                                        </g>

                                        <!-- 4. Manggarai -->
                                        <g class="station-node" data-station="Manggarai" transform="translate(524, 451)">
                                            <circle cx="0" cy="0" r="18" class="station-circle"></circle>
                                            <text x="25" y="5" class="station-text">Manggarai</text>
                                        </g>

                                        <!-- 5. Bogor -->
                                        <g class="station-node" data-station="Bogor" transform="translate(542, 921)">
                                            <circle cx="0" cy="0" r="16" class="station-circle"></circle>
                                            <text x="25" y="5" class="station-text">Bogor</text>
                                        </g>
                                    </svg>
                                </div>
                            </div>
                        </div>

                        <div class="mt-4">
                            <button type="button" class="btn btn-danger w-100">Kirim Laporan</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.css"></script>
<script src="script.js"></script>
</body>
</html>
